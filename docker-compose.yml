version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bolosya-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bolosya_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bolosya-network

  redis:
    image: redis:7-alpine
    container_name: bolosya-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bolosya-network

  minio:
    image: minio/minio:latest
    container_name: bolosya-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bolosya-network

  adminer:
    image: adminer:latest
    container_name: bolosya-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - bolosya-network

  # Optional: MailHog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bolosya-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - bolosya-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  bolosya-network:
    driver: bridge