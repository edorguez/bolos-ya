services:

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bolos-ya-server
    ports:
      - "${PORT}:${PORT}"
    environment:
      PORT: ${PORT}
      SERVER_HOST: ${SERVER_HOST}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT}
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}?sslmode=disable
      REDIS_URL: redis://redis:6379/${REDIS_DB}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BETTER_AUTH_URL: http://auth-server:3001
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BCV_API_URL: ${BCV_API_URL}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_S3_ENDPOINT: http://minio:9000
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bolos-ya-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: bolos-ya-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - bolos_ya_db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bolos-ya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: bolos-ya-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - bolos_ya_redis_data:/data
    networks:
      - bolos-ya-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio:latest
    container_name: bolos-ya-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "${MINIO_PORT_1}:9000"
      - "${MINIO_PORT_2}:9001"
    volumes:
      - bolos_ya_minio_data:/data
    networks:
      - bolos-ya-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  auth-server:
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    container_name: bolos-ya-auth-server
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}?sslmode=disable
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ORIGINS: ${APP_ALLOWED_ORIGINS}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bolos-ya-network
    restart: unless-stopped

volumes:
  bolos_ya_db_data:
  bolos_ya_redis_data:
  bolos_ya_minio_data:

networks:
  bolos-ya-network:
    driver: bridge
